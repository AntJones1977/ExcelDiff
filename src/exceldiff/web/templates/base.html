<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ExcelDiff{% endblock %}</title>
    <style>
        :root {
            --color-added: #10b981;
            --color-added-bg: #ecfdf5;
            --color-removed: #ef4444;
            --color-removed-bg: #fef2f2;
            --color-modified: #f59e0b;
            --color-modified-bg: #fffbeb;
            --color-unchanged: #94a3b8;
            --color-primary: #1e40af;
            --color-primary-hover: #1e3a8a;
            --color-border: #e2e8f0;
            --color-bg: #f8fafc;
            --color-surface: #ffffff;
            --color-text: #1e293b;
            --color-text-secondary: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
        }
        .navbar {
            background: var(--color-primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .navbar h1 { font-size: 1.2rem; font-weight: 700; }
        .navbar a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; }
        .navbar a:hover { color: white; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .flash { padding: 12px 16px; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
        .flash.error { background: var(--color-removed-bg); color: var(--color-removed); border: 1px solid var(--color-removed); }
        .flash.success { background: var(--color-added-bg); color: var(--color-added); border: 1px solid var(--color-added); }
        .card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-primary:hover { background: var(--color-primary-hover); }
        .btn-secondary { background: var(--color-bg); color: var(--color-text); border: 1px solid var(--color-border); }
        .btn-secondary:hover { background: var(--color-border); }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
        th { background: var(--color-bg); text-align: left; padding: 10px 12px; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-secondary); border-bottom: 2px solid var(--color-border); }
        td { padding: 8px 12px; border-bottom: 1px solid var(--color-border); }
        tr:hover td { background: var(--color-bg); }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .badge.added { background: var(--color-added-bg); color: var(--color-added); }
        .badge.removed { background: var(--color-removed-bg); color: var(--color-removed); }
        .badge.modified { background: var(--color-modified-bg); color: var(--color-modified); }
        .badge.unchanged { background: var(--color-bg); color: var(--color-unchanged); }
        .formula { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.85rem; }
        .cell-coord { font-weight: 600; color: var(--color-primary); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <h1>ExcelDiff</h1>
        <a href="{{ url_for('main.index') }}">New Comparison</a>
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
